spring:
  application:
    name: streaming-chat-memory
  threads:
    virtual:
      enabled: true

  ai:
    ollama:
      base-url: http://localhost:11434
      chat:
        options:
          model: qwen3.5:9b
          temperature: 0.7
          num-ctx: 8192
          keep-alive: 10m
      init:
        pull-model-strategy: when_missing

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health, info
  endpoint:
    health:
      show-details: always
